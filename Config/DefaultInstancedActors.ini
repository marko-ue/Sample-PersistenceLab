[/Script/InstancedActors.InstancedActorsProjectSettings]
; Swap the active InstancedActors subsystem for the example subclass, which spawns
; AExampleInstancedActorsManager -> UExampleInstancedActorsData. That data class wires the
; already-replicated lifecycle phase to Visual State on late-joining clients for dehydrated instances.
; Only InstancedActorsSubsystemClass is overridden; the other FInstancedActorsConfig members
; (server/client spawner, stationary viz trait) keep their engine defaults.
DefaultConfig=(InstancedActorsSubsystemClass="/Script/PersistenceExamples.ExampleInstancedActorsSubsystem")
